<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <!-- 10X 그라디언트 (레드 → 오렌지 → 옐로우) -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C41E3A;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#D22027;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#E85D21;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5A623;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 배경 없음 (투명) -->
  
  <!-- 10X 메인 로고 -->
  <g transform="translate(450, 160)">
    <!-- 숫자 1 -->
    <path d="M -280 -90 L -200 -90 L -200 80 L -270 80 L -270 -20 L -280 -20 Z" 
          fill="url(#mainGradient)" 
          transform="skewX(-8)"/>
    
    <!-- 숫자 0 -->
    <ellipse cx="-90" cy="-5" rx="70" ry="85" 
             fill="url(#mainGradient)" 
             transform="skewX(-8)"/>
    <ellipse cx="-90" cy="-5" rx="35" ry="50" 
             fill="black" opacity="0" 
             transform="skewX(-8)"/>
    <path d="M -90 -90 Q -20 -90 -20 -5 Q -20 80 -90 80 Q -160 80 -160 -5 Q -160 -90 -90 -90 
             M -90 -50 Q -120 -50 -120 -5 Q -120 40 -90 40 Q -60 40 -60 -5 Q -60 -50 -90 -50" 
          fill="url(#mainGradient)" 
          transform="skewX(-8)"/>
    
    <!-- X -->
    <g transform="skewX(-15)">
      <!-- X 왼쪽 사선 -->
      <path d="M 70 -90 L 140 -90 L 240 80 L 170 80 Z" 
            fill="url(#mainGradient)"/>
      <!-- X 오른쪽 사선 -->
      <path d="M 220 -90 L 290 -90 L 190 80 L 120 80 Z" 
            fill="url(#mainGradient)"/>
    </g>
  </g>
  
  <!-- ACCELERATE YOUR GAME 텍스트 -->
  <text x="450" y="260" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" 
        font-size="32" 
        text-anchor="middle" 
        fill="#D22027" 
        letter-spacing="8">
    ACCELERATE YOUR GAME
  </text>
</svg>